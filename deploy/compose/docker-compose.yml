name: vexa-v012
# v0.12 control plane (P4). The carved analog of deploy/compose/docker-compose.yml (0.11):
# postgres:17 + redis:7 + minio + minio-init infra, then the four long-running Python services —
# admin-api · runtime · meeting-api · gateway — each building its own slim uv-based image.
# Improvement over 0.11: EVERY service carries a healthcheck and depends_on waits on
# `condition: service_healthy` so the bring-up is ordered + observable.
#
# Bot is NOT a compose service: runtime spawns vexaai/vexa-bot:v012 (BROWSER_IMAGE) on demand via the
# mounted /var/run/docker.sock. That published ~3.6GB image is a REFERENCE here, never built.

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks: [vexa]
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    command: ["postgres", "-c", "idle_in_transaction_session_timeout=60000"]
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      # The backend operates only UTC time. Pin the DB clock to UTC so func.now()/server_default/
      # onupdate (the naive timestamp columns' server-side values, main's pattern) are guaranteed UTC.
      - TZ=UTC
      - PGTZ=UTC
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5458}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vexa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [vexa]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio-data:/data
    networks: [vexa]
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa}
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks: [vexa]

  # ─── Core services ────────────────────────────────────────────────────────────────────────────
  admin-api:
    build:
      context: ../../core/identity/services/admin-api
      dockerfile: Dockerfile
    image: vexaai/v012-admin-api:${IMAGE_TAG:-dev}
    ports:
      - "127.0.0.1:${ADMIN_API_PORT:-18057}:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - ADMIN_API_TOKEN=${ADMIN_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    networks: [vexa]
    restart: unless-stopped

  runtime:
    build:
      context: ../../core/runtime
      dockerfile: Dockerfile
    image: vexaai/v012-runtime:${IMAGE_TAG:-dev}
    # The runtime spawns bot containers via the host Docker socket (DockerBackend → socket API,
    # requests_unixsocket — no docker CLI in the image, like main).
    group_add:
      - "${DOCKER_GID:-0}"
    ports:
      - "127.0.0.1:${RUNTIME_API_PORT:-18090}:8090"
    # Provider auth (ANTHROPIC_AUTH_TOKEN + ANTHROPIC_BASE_URL) is sourced from .env via env_file so the
    # token/endpoint pair is a SINGLE SOURCE OF TRUTH the ambient shell cannot shadow. The runtime brokers
    # these into spawned agent containers, so a shell-shadowed base_url here would poison every agent.
    env_file:
      # required:false — a fresh checkout (CI, gate worktree) has no .env; the proof stack
      # must boot without LLM auth. On a real deploy the file exists and wins as before.
      - path: .env
        required: false
    environment:
      - BROWSER_IMAGE=${BROWSER_IMAGE:-vexaai/vexa-bot:v012}
      # The per-dispatch WORKER image the runtime spawns (control-plane ⊥ worker split). AGENT_WORKER_IMAGE
      # is set EXPLICITLY (no suffix derivation); AGENT_IMAGE now matches the built control-plane tag.
      - AGENT_IMAGE=${AGENT_IMAGE:-vexaai/v012-agent-api:${IMAGE_TAG:-dev}}
      - AGENT_WORKER_IMAGE=${AGENT_WORKER_IMAGE:-vexaai/v012-agent-worker:${IMAGE_TAG:-dev}}
      # Optional low-latency tuning for the Google Meet speaker-stream pipeline. Empty values keep
      # the bot defaults; runtime forwards configured values to spawned bot containers.
      - BOT_SPEAKER_MIN_AUDIO_SEC=${BOT_SPEAKER_MIN_AUDIO_SEC:-}
      - BOT_SPEAKER_SUBMIT_INTERVAL_SEC=${BOT_SPEAKER_SUBMIT_INTERVAL_SEC:-}
      - BOT_SPEAKER_CONFIRM_THRESHOLD=${BOT_SPEAKER_CONFIRM_THRESHOLD:-}
      - BOT_SPEAKER_MAX_BUFFER_SEC=${BOT_SPEAKER_MAX_BUFFER_SEC:-}
      - BOT_SPEAKER_IDLE_TIMEOUT_SEC=${BOT_SPEAKER_IDLE_TIMEOUT_SEC:-}
      - VEXA_AGENT_SRC_MOUNT=${VEXA_AGENT_SRC_MOUNT:-}
      - REDIS_URL=redis://redis:6379/0
      # The Runtime brokers model credentials into spawned agents. Subscription credentials may be
      # mounted from the host; API-style Anthropic/OpenRouter env is forwarded from this trusted service.
      - HOST_CLAUDE_CREDENTIALS=${HOST_CLAUDE_CREDENTIALS:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # ANTHROPIC_AUTH_TOKEN + ANTHROPIC_BASE_URL now come from env_file (above), NOT environment: — an
      # `environment:` ${VAR} entry interpolates the AMBIENT SHELL first and silently shadowed .env (prod 401).
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Spawn the bot onto THIS compose network so it resolves meeting-api:8080 (lifecycle callback)
      # + redis. Must equal the project-prefixed network name (DockerBackend → HostConfig.NetworkMode).
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa-v012}_vexa
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mirror of HOST_CLAUDE_CREDENTIALS (a DOCKER-HOST path — see .env.example) into THIS container,
      # so the config.v1 `model_inference` file probe can verify the host file actually exists before
      # any worker spawns: docker bind-mounts a MISSING host path as an empty DIRECTORY, which is how
      # a bad path becomes 'Model inference failed: Not logged in' inside the worker. /dev/null when
      # unset (the probe is skipped then — an ANTHROPIC_* key may be the credential path instead).
      - ${HOST_CLAUDE_CREDENTIALS:-/dev/null}:/var/lib/vexa/host-claude-credentials:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    init: true
    depends_on:
      redis:
        condition: service_healthy
    networks: [vexa]
    restart: unless-stopped

  # Build-only: the per-dispatch WORKER image the runtime spawns (claude-in-container; NOT a long-running
  # service). Built via `docker compose build agent-worker`; the runtime references it by AGENT_WORKER_IMAGE.
  # `profiles` keeps it out of `up`; `command: true` makes an accidental start a no-op.
  agent-worker:
    build:
      context: ../..
      dockerfile: core/agent/worker/Dockerfile
    image: vexaai/v012-agent-worker:${IMAGE_TAG:-dev}
    profiles: ["build-only"]
    command: ["true"]

  agent-api:
    # The unit control plane — POST /invocations (dispatch → runtime.v1 agent spawn), /api/chat (SSE),
    # /api/sessions, /health. Wider build context (the carve root) to vendor the sealed schemas it
    # validates by path. The unit WORKER is a separate runtime.v1 `agent` workload (claude-in-container).
    build:
      context: ../..
      dockerfile: core/agent/services/agent-api/Dockerfile
    image: vexaai/v012-agent-api:${IMAGE_TAG:-dev}
    ports:
      - "127.0.0.1:${AGENT_API_PORT:-18100}:8100"
    # Provider auth (ANTHROPIC_AUTH_TOKEN + ANTHROPIC_BASE_URL) is sourced from .env via env_file so it is
    # a SINGLE SOURCE OF TRUTH that the ambient shell cannot shadow. env_file values are NOT interpolated
    # through the host shell (unlike `environment:` ${VAR} entries), which is exactly the prod-401 fix.
    env_file:
      # required:false — a fresh checkout (CI, gate worktree) has no .env; the proof stack
      # must boot without LLM auth. On a real deploy the file exists and wins as before.
      - path: .env
        required: false
    environment:
      - VEXA_AGENT_API_PORT=8100
      - VEXA_RUNTIME_API_URL=http://runtime:8090
      # P0 SSE ownership: agent-api verifies meeting-row ownership before opening /api/meeting/stream (owner-scoped like /ws).
      - VEXA_MEETING_API_URL=http://meeting-api:8080
      # How the runtime's scheduler reaches this service's /invocations sink when a routine fires (MVP2).
      - VEXA_AGENT_API_SELF_URL=http://agent-api:8100
      - VEXA_AGENT_PROFILE=agent
      - VEXA_WORKSPACES_DIR=/workspaces
      # Lane M: the users.data.memberships[] index mirror over the admin-api internal edge
      # (policy/members.json in the workspace git repo stays authoritative; this is the listing cache).
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - VEXA_INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      # Identity (P20): agent-api derives the subject from the gateway-injected X-User-Id. Until the terminal
      # routes through the gateway (Stage 4), it still reaches agent-api directly with no header, so this
      # single-user fallback keeps the dev stack working (shared subject). Remove it once the gateway fronts
      # agent-api and X-User-Id is always present — then a missing header fails closed (401).
      - VEXA_AGENT_DEFAULT_SUBJECT=${VEXA_AGENT_DEFAULT_SUBJECT:-u_live}
      - VEXA_AGENT_MODEL=${VEXA_AGENT_MODEL:-}
      - VEXA_MEETING_MODEL=${VEXA_MEETING_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # ANTHROPIC_AUTH_TOKEN + ANTHROPIC_BASE_URL come from env_file (below), NOT environment: — an
      # `environment:` entry interpolates the AMBIENT SHELL first, so a host `export ANTHROPIC_BASE_URL`
      # silently shadowed deploy/compose/.env and a prod 401 followed (OpenRouter token → api.anthropic.com).
      # env_file reads the value literally from .env; the shell can no longer override it (single source of truth).
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - VEXA_LOG_LEVEL=${LOG_LEVEL:-info}
      # Stream primitive — the per-dispatch redis Streams the control plane relays (unit:<id>:out → SSE).
      - VEXA_REDIS_URL=redis://redis:6379/0
      # The backing the Runtime binds into the worker as the workspace store (the project-prefixed volume).
      - VEXA_WORKSPACE_MOUNT_SOURCE=${COMPOSE_PROJECT_NAME:-vexa-v012}_agent-workspaces
      # Three-tier mount stack (AMENDMENT 4): the platform-owned GLOBAL SYSTEM workspace (_global) mounted
      # READ-ONLY into every worker (behaviour/skills/tools). Empty = no _global mount (mount-when-present);
      # REF pins it to a branch/tag/sha for safe rollout, empty = HEAD.
      - VEXA_GLOBAL_SYSTEM_WORKSPACE_PATH=${VEXA_GLOBAL_SYSTEM_WORKSPACE_PATH:-}
      - VEXA_GLOBAL_SYSTEM_WORKSPACE_REF=${VEXA_GLOBAL_SYSTEM_WORKSPACE_REF:-}
      # The shared key the control plane signs per-dispatch tokens with (dev tier; k8s → SPIRE).
      - VEXA_DISPATCH_SIGNING_KEY=${VEXA_DISPATCH_SIGNING_KEY:-dev-dispatch-signing-key}
      # 'Add bot from URL' (terminal): agent-api forwards POST /api/meeting/bot → the gateway POST /bots.
      - VEXA_GATEWAY_URL=http://gateway:8000
      - VEXA_BOT_API_KEY=${VEXA_BOT_API_KEY:-}
    volumes:
      # The Workspace store backing (dev): the worker mounts the subject's subdir; agent-api reads the tree.
      - agent-workspaces:/workspaces
      # Settings → Models "Test" button: /api/models/test inspects the SAME subscription credential
      # file the runtime brokers into workers (existence + expiry check — surfaces the stale-Keychain
      # 401 with its remedy instead of failing the next chat turn). /dev/null when unset, same
      # convention as the runtime's probe mount.
      - ${HOST_CLAUDE_CREDENTIALS:-/dev/null}:/var/lib/vexa/host-claude-credentials:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    init: true
    depends_on:
      runtime:
        condition: service_healthy
    networks: [vexa]
    restart: unless-stopped

  meeting-api:
    build:
      # Wider context (the v0.12 carve root) than the other services: meeting_api validates at the
      # seam and loads the sealed invocation/lifecycle/webhook/runtime/schedule schemas BY PATH, so
      # those frozen contract files are vendored into the image (see the Dockerfile).
      context: ../..
      dockerfile: core/meetings/services/meeting-api/Dockerfile
    image: vexaai/v012-meeting-api:${IMAGE_TAG:-dev}
    ports:
      - "127.0.0.1:${MEETING_API_PORT:-18080}:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379/0
      - RUNTIME_API_URL=http://runtime:8090
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      # The background sweeps' internal lookups: auto-join fetches per-user spawn context
      # (/internal/users/{id}/bot-context) and calendar sync discovers connected ICS feeds
      # (/internal/calendar-configs). Unset -> calendar sync no-ops, auto-join spawns uncapped.
      - ADMIN_API_URL=http://admin-api:8001
      # MeetingToken is signed (mint) AND verified (recordings upload) with ADMIN_TOKEN — the SAME
      # admin secret admin-api holds (admin-api gets ADMIN_API_TOKEN=${ADMIN_TOKEN}). Exactly like
      # main (meeting-api ADMIN_TOKEN = admin-api ADMIN_API_TOKEN). __main__ passes token_secret=ADMIN_TOKEN.
      - ADMIN_TOKEN=${ADMIN_TOKEN:-changeme}
      # STT the spawned bot transcribes with — bot_spawn threads these into the invocation (registry
      # `stt` resource; the funded internal@vexa.ai token). Unset → bot joins+captures but no transcript.
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      # Deployment-level defaults for a spawn's transcribe/recording flags when the request does not
      # say (config.v1 `defaulted` keys). TRANSCRIBE_ENABLED=false makes a no-STT deployment spawn
      # capture-only bots instead of 503-ing every default POST /bots.
      - TRANSCRIBE_ENABLED=${TRANSCRIBE_ENABLED:-true}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-true}
      # Self-hosted Jitsi hostnames (comma-separated) recognized in pasted + calendar links.
      - VEXA_JITSI_HOSTS=${VEXA_JITSI_HOSTS:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runtime:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [vexa]
    restart: unless-stopped

  gateway:
    build:
      context: ../../core/gateway/services/gateway
      dockerfile: Dockerfile
    image: vexaai/v012-gateway:${IMAGE_TAG:-dev}
    ports:
      - "127.0.0.1:${API_GATEWAY_HOST_PORT:-18056}:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - MEETING_API_URL=http://meeting-api:8080
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # fastapi-guard edge layer (edge_guard.py): per-IP throttle + auto-ban at the edge.
      # ON by default with generous limits (owner ruling — protection that ships dark protects
      # nobody). Opt out with GUARD_ENABLED=false in .env; all keys interpolate from .env.
      # GUARD_WS_ENABLED is the optional /ws hook (off, opt-in): in-memory per-process — does
      # NOT share ban/rate-limit state with the Redis-backed HTTP layer, and under uvicorn
      # --workers N>1 each worker keeps an independent WS ban set.
      - GUARD_ENABLED=${GUARD_ENABLED:-true}
      - GUARD_WS_ENABLED=${GUARD_WS_ENABLED:-false}
      - GUARD_ENABLE_REDIS=${GUARD_ENABLE_REDIS:-true}
      - GUARD_RATE_LIMIT_RPM=${GUARD_RATE_LIMIT_RPM:-600}
      - GUARD_RATE_LIMIT_WINDOW=${GUARD_RATE_LIMIT_WINDOW:-60}
      - GUARD_AUTO_BAN_THRESHOLD=${GUARD_AUTO_BAN_THRESHOLD:-10}
      - GUARD_AUTO_BAN_DURATION=${GUARD_AUTO_BAN_DURATION:-3600}
      - GUARD_IP_WHITELIST=${GUARD_IP_WHITELIST:-}
      - GUARD_IP_BLACKLIST=${GUARD_IP_BLACKLIST:-}
      - GUARD_TRUSTED_PROXIES=${GUARD_TRUSTED_PROXIES:-}
      - GUARD_TRUST_X_FORWARDED_PROTO=${GUARD_TRUST_X_FORWARDED_PROTO:-false}
      - GUARD_BLOCKED_COUNTRIES=${GUARD_BLOCKED_COUNTRIES:-}
      - GUARD_BLOCK_CLOUD_PROVIDERS=${GUARD_BLOCK_CLOUD_PROVIDERS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    init: true
    depends_on:
      admin-api:
        condition: service_healthy
      meeting-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [vexa]
    restart: unless-stopped

  # MCP service — the Model Context Protocol front for the PUBLIC API (v0.12 port of 0.10.6
  # services/mcp). Stateless: every tool call forwards the caller's key to the gateway as
  # X-API-Key; exposed on its OWN host port (no gateway /mcp forward yet — see the service README).
  mcp:
    build:
      context: ../../core/meetings/services/mcp
      dockerfile: Dockerfile
    image: vexaai/v012-mcp:${IMAGE_TAG:-dev}
    ports:
      - "127.0.0.1:${MCP_HOST_PORT:-18010}:8010"
    environment:
      - GATEWAY_URL=http://gateway:8000
      - PORT=8010
      - VEXA_ENV=${VEXA_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Same declared-jitsi-hosts setting meeting-api reads — the two parsers must agree.
      - VEXA_JITSI_HOSTS=${VEXA_JITSI_HOSTS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8010/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    init: true
    depends_on:
      gateway:
        condition: service_healthy
    networks: [vexa]
    restart: unless-stopped

  # The user-facing web UI (Next.js custom server). Proxies /ws → gateway and REST → agent-api/admin-api.
  # The terminal is the front door for humans; the gateway remains the API front door for programmatic use.
  terminal:
    build:
      context: ../../clients/terminal
      dockerfile: Dockerfile
      args:
        # Google Analytics 4 measurement id, baked into the client bundle at build time (NEXT_PUBLIC_*).
        # Set GA_MEASUREMENT_ID in .env, then rebuild the terminal image. Empty → GA stays off.
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
        # Terminal mode, baked at build time (NEXT_PUBLIC_* — see clients/terminal/src/app/mode.ts).
        # "meetings" = meetings-only terminal: only the meetings list + meeting/canvas tabs + the
        # API-tokens surface load, and the server proxy refuses agent-api paths (404). Uncomment
        # (or set TERMINAL_MODE=meetings in .env) and REBUILD the terminal image to enable:
        # NEXT_PUBLIC_TERMINAL_MODE: ${TERMINAL_MODE:-meetings}
        # Bot display name, baked at build time (NEXT_PUBLIC_* — see clients/terminal/src/app/botName.ts).
        # Set BOT_NAME in .env, then rebuild the terminal image. Empty → "Vexa".
        NEXT_PUBLIC_BOT_NAME: ${BOT_NAME:-}
        # Runtime node_modules flavor (clients/terminal/Dockerfile): prod (default, pruned) or
        # dev (full tree). Set TERMINAL_RUNTIME_DEPS=dev in .env on hosts that run the terminal
        # under the hot overlay's NODE_ENV=development — dev-mode Next needs the dev toolchain at
        # runtime and otherwise npm-installs it AT BOOT (slow, network-dependent, currently broken).
        RUNTIME_DEPS: ${TERMINAL_RUNTIME_DEPS:-prod}
    image: vexaai/v012-terminal:${IMAGE_TAG:-dev}
    ports:
      # TERMINAL_BIND=0.0.0.0 exposes the UI to the local network (phone access). Anyone on that
      # network can reach the login page — including the password-less direct login — so keep the
      # default loopback bind unless the network is trusted.
      - "${TERMINAL_BIND:-127.0.0.1}:${TERMINAL_PORT:-13000}:3000"
    environment:
      - NODE_ENV=production
      # HTTP scheme: the terminal's REST proxy fetches GATEWAY_URL as http; server.mjs converts it to
      # ws:// itself for the /ws upgrade. ws:// here would break the REST proxy (502 fetch failed).
      - GATEWAY_URL=http://gateway:8000
      - AGENT_API_URL=http://agent-api:8100
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - VEXA_API_URL=http://gateway:8000
      - VEXA_ADMIN_API_KEY=${ADMIN_TOKEN:-changeme}
      - VEXA_BOT_API_KEY=${VEXA_BOT_API_KEY:-}
      # Hidden admin panel (/api/admin/*): comma-separated email allowlist — EMPTY = the panel is off
      # for everyone. Identity is VERIFIED against admin-api /internal/validate over the internal-tier
      # secret (never trusted from a cookie), and the same secret fronts agent-api's admin overview.
      - VEXA_ADMIN_EMAILS=${VEXA_ADMIN_EMAILS:-}
      # Direct email login allowlist (comma-separated) — admits these identities through the
      # password-less debug login IN ADDITION to "test" emails. Anyone who can reach the terminal
      # can sign in as a listed email, so list only operator-owned identities. Empty = test-only.
      # LOCALHOST-ONLY by design: when NEXTAUTH_URL/TERMINAL_URL declares a non-local origin the
      # allowlist fails closed unless ALLOW_DIRECT_LOGIN_OVER_NETWORK=1 opts in explicitly.
      - DIRECT_LOGIN_EMAILS=${DIRECT_LOGIN_EMAILS:-}
      - ALLOW_DIRECT_LOGIN_OVER_NETWORK=${ALLOW_DIRECT_LOGIN_OVER_NETWORK:-}
      - VEXA_INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      # Declared self-hosted Jitsi hostnames — served to the client link parser
      # (/api/meeting/jitsi-hosts) so pasted links on these hosts are recognized in the UI,
      # matching meeting-api's and mcp's parsers (same setting).
      - VEXA_JITSI_HOSTS=${VEXA_JITSI_HOSTS:-}
      # Composer mic dictation (/api/stt) — same STT service the meeting pipeline uses; token stays
      # server-side. Empty → the mic button reports "not configured" instead of failing silently.
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-nextauth-secret}
      # Public origin when self-hosting behind a domain/reverse-proxy (e.g. https://vexa.example.com).
      # Empty by default (localhost). Setting an https:// value also flips auth cookies to Secure.
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      # OAuth login providers (NextAuth). Each provider self-gates on its creds: set BOTH the id and
      # secret to expose that sign-in button on the login page; leave empty to hide it (the dev
      # type-any-email login still works). Register the redirect URI in the provider console:
      #   Google    → ${NEXTAUTH_URL}/api/auth/callback/google
      #   Microsoft → ${NEXTAUTH_URL}/api/auth/callback/microsoft
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      # Microsoft tenant: "common" = work/school + personal accounts; or a specific tenant id for org-only.
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    init: true
    depends_on:
      gateway:
        condition: service_healthy
      agent-api:
        condition: service_healthy
    networks: [vexa]
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:
  agent-workspaces:

networks:
  vexa:
    driver: bridge
