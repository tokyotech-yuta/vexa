# Workspace packages. Globs match dirs that have a package.json; empty dirs are ignored
# (so this is green-on-empty and fills in as domains are populated, contract-first).
# Open-core scope: core/ services + modules, packages/, and the terminal client. (The full
# product's integrations/, sdks/, tools/, and dashboard clients are not part of this repo.)
packages:
  - "core/runtime"
  - "core/gateway"
  - "core/meetings/services/*"
  - "core/meetings/modules/*"
  - "core/agent/services/*"
  - "core/agent/modules/*"
  - "core/identity/services/*"
  - "core/identity/modules/*"
  - "clients/terminal"
# Build scripts pnpm may run (pnpm ≥10 blocks postinstall by default). esbuild
# ships the native binary our TS test runner (tsx) needs; onnxruntime-node (+ its
# transitive sharp/protobufjs, via @huggingface/transformers in @vexa/mixed-pipeline)
# fetches the native ONNX runtime the pyannote segmenter runs on in production. The
# mixed-pipeline goldens are model-free, so the gate stays green even before download.
allowBuilds:
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
# Security floor (GHSA-qx2v-qp2m-jg93): next pins postcss 8.4.31 exactly; postcss 8.5.x is
# API-compatible. clients/terminal/package.json carries the same floor for its npm lockfile.
overrides:
  "postcss@<8.5.10": ">=8.5.10"
  # Security floor (GHSA-xcpc-8h2w-3j85): crafted-ZIP 4 GB allocation in adm-zip <0.6.0,
  # reached only in onnxruntime-node's postinstall unpack of its own runtime archive.
  "adm-zip@<0.6.0": ">=0.6.0"
